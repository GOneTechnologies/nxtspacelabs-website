  .err-shell {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: grid; place-items: center;
    padding: 100px 24px;
  }
  .err-inner { max-width: 720px; text-align: center; }
  .err-num {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px; letter-spacing: 4px; color: var(--dim-2);
    margin-bottom: 24px; text-transform: uppercase;
  }
  .err-glyph {
    font-family: "Fraunces", serif; font-weight: 200;
    font-size: clamp(120px, 22vw, 260px);
    line-height: 0.95; letter-spacing: -0.05em;
    margin: 0 0 24px;
    background: linear-gradient(135deg, #F472B6 0%, #A78BFA 45%, #60A5FA 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 60px rgba(167, 139, 250, 0.35));
  }
  .err-title {
    font-family: "Fraunces", serif; font-weight: 300;
    font-size: clamp(28px, 4vw, 42px);
    letter-spacing: -0.025em; margin-bottom: 16px;
  }
  .err-title .italic {
    font-family: "Instrument Serif", serif; font-style: italic; color: var(--nebula);
  }
  .err-lede {
    color: var(--dim); font-size: 16px; line-height: 1.75;
    margin-bottom: 40px; max-width: 480px; margin-left: auto; margin-right: auto;
  }
  .err-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .err-actions a { color: var(--mist); }
  .err-quicklinks {
    margin-top: 60px; padding-top: 32px;
    border-top: 1px solid var(--line);
    display: flex; flex-wrap: wrap; gap: 8px 22px;
    justify-content: center; align-items: baseline;
  }
  .err-quicklinks-label {
    width: 100%; text-align: center;
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--dim-2); margin-bottom: 6px;
  }
  .err-quicklinks a {
    color: var(--dim); font-family: "Inter"; font-size: 14px;
    text-decoration: none; padding: 4px 2px;
    border-bottom: 1px solid transparent;
    transition: color .2s ease, border-color .2s ease;
  }
  .err-quicklinks a:hover { color: var(--nebula); border-bottom-color: var(--nebula); }
</style>
